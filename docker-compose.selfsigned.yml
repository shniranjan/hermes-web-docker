# Local HTTPS stack — Nginx with self-signed SSL + Hermes Agent.
# No domain, no Certbot. Cookie-based access control (same as production).
#
# Quick start:
#   cp .env.example .env              # set ACCESS_KEY_SECRET + API keys
#   docker compose -f docker-compose.selfsigned.yml up -d
#
# Then open https://localhost (browser will warn about self-signed cert —
# click Advanced → Proceed).

services:
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET:?Set ACCESS_KEY_SECRET in .env}
    volumes:
      - ./nginx/selfsigned.conf.template:/etc/nginx/conf.d/selfsigned.conf.template:ro
      - ./scripts/nginx-selfsigned-entrypoint.sh:/entrypoint.sh:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /entrypoint.sh
    depends_on:
      - hermes

  hermes:
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    pull_policy: missing
    command: sleep infinity
    ports:
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}

volumes:
  hermes_data:
