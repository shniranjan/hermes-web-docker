# Local HTTPS stack — Nginx reverse proxy with self-signed SSL + Hermes Agent.
# No Certbot needed (cert is self-signed, no Let's Encrypt).
# Access at: https://localhost or https://<your-lan-ip>
# Browser will show a security warning — that's expected for self-signed certs.
# Click "Advanced" → "Proceed to localhost (unsafe)" to visit.

services:
  # --- Nginx reverse proxy with self-signed HTTPS ---
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.selfsigned.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - hermes
    networks:
      - hermes-net

  # --- Hermes Agent ---
  hermes:
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    pull_policy: missing
    command: sleep infinity
    ports:
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - hermes-net

volumes:
  hermes_data:

networks:
  hermes-net:
    driver: bridge
