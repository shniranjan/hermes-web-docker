# Local HTTPS stack — Nginx with self-signed SSL + Hermes Agent.
# No domain, no Certbot. Password + cookie-based access control.
#
# Quick start:
#   cp .env.example .env              # set DASHBOARD_PASSWORD + API keys
#   docker compose -f docker-compose.selfsigned.yml up -d
#
# Then open https://localhost (browser will warn about self-signed cert —
# click Advanced → Proceed). Log in with the password from .env.

services:
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET:-}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD:?Set DASHBOARD_PASSWORD in .env}
    volumes:
      - ./nginx/selfsigned.conf.template:/etc/nginx/conf.d/selfsigned.conf.template:ro
      - ./scripts/nginx-selfsigned-entrypoint.sh:/entrypoint.sh:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /entrypoint.sh
    depends_on:
      - hermes
    networks:
      - hermes-net

  hermes:
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes-local
    restart: unless-stopped
    pull_policy: missing
    command: sleep infinity
    # Hermes is only exposed to nginx via the Docker network — NOT on the host.
    # port 9119 is intentionally NOT exposed to prevent bypassing auth.
    volumes:
      - hermes_data:/opt/data
    networks:
      hermes-net:
        aliases:
          - hermes-local
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=0
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}

volumes:
  hermes_data:

networks:
  hermes-net:
    driver: bridge
