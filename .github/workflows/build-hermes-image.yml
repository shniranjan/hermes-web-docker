name: Build and Publish Hermes Agent Image

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger

env:
  IMAGE_NAME: hermes-agent
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out this repository
        uses: actions/checkout@v4

      - name: Clone upstream hermes-agent
        run: |
          git clone --depth 1 https://github.com/NousResearch/hermes-agent.git /tmp/hermes-agent

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build full upstream image and push
        uses: docker/build-push-action@v5
        with:
          context: /tmp/hermes-agent
          file: /tmp/hermes-agent/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:full
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-full
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build slim image and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.slim
          push: true
          build-contexts: |
            full-image=docker-image://${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-full
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:slim
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
