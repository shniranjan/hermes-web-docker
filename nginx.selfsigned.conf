# Nginx config for local HTTPS with self-signed certificate.
# No Certbot, no access key guard — suitable for local-only use.

server {
    listen 80;
    server_name hermes.local localhost 127.0.0.1;

    # Redirect all HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hermes.local localhost 127.0.0.1;

    ssl_certificate     /etc/letsencrypt/live/hermes.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermes.local/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Disable access key guard for local use — Hermes dashboard itself
    # is protected by HERMES_DASHBOARD_INSECURE=1 which allows local access.
    # If you want access-key protection anyway, see nginx.conf.template.

    location / {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /;
    }

    # WebSocket endpoints — required for Hermes dashboard
    location /api/ws {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/pty {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    location /api/events {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
