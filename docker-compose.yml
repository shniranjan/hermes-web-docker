services:
  # --- Nginx reverse proxy with automatic HTTPS ---
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET:?Set ACCESS_KEY_SECRET in .env}
    volumes:
      - ./nginx.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    command: /bin/sh -c "envsubst '$$ACCESS_KEY_SECRET' < /etc/nginx/conf.d/default.conf.template > /etc/nginx/conf.d/default.conf && echo 'nginx config rendered with access key' && nginx -g 'daemon off;'"
    depends_on:
      - hermes
    networks:
      - hermes-net

  # --- Certbot for automatic Let's Encrypt SSL ---
  certbot:
    image: certbot/certbot:latest
    container_name: hermes-certbot
    restart: "no"
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet; sleep 12h; done"
    networks:
      - hermes-net

    # --- Hermes Agent ---
    hermes:
    # Use the slim image (default). Switch to :full for complete image with build tools, ffmpeg, git, docker-cli, Playwright
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    pull_policy: missing   # only pull if image not already present
    # Override CMD to keep the container alive. The dashboard runs as a
    # separate s6 service, so it stays up regardless of the main process.
    command: sleep infinity
    ports:
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
      # Optional: mount Docker socket for docker-in-docker tools
      # - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    networks:
      - hermes-net

volumes:
  hermes_data:

networks:
  hermes-net:
    driver: bridge
