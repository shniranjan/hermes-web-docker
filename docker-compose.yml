# Hermes Agent — production stack.
# Hermes only. Nginx runs in a separate compose stack (see docker-compose.nginx.yml).
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in API keys
#   2. For HTTPS, also start the nginx stack: docker compose -f docker-compose.nginx.yml up -d
#
# Quick start:
#   cp .env.example .env          # then edit .env
#   docker compose up -d
#   docker compose -f docker-compose.nginx.yml up -d

services:
  hermes:
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes-local
    restart: unless-stopped
    pull_policy: missing
    command: sleep infinity
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    networks:
      hermes-net:
        aliases:
          - hermes-local

volumes:
  hermes_data:

# Shared network — nginx stack connects as external
networks:
  hermes-net:
    driver: bridge
