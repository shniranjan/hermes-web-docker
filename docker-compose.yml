# Production HTTPS stack — Hermes Agent + Nginx + Let's Encrypt.
#
# Prerequisites:
#   1. Copy .env.example to .env and fill in all values
#   2. Your domain DNS must point to this server
#   3. Ports 80 and 443 must be reachable from the internet
#
# Quick start:
#   cp .env.example .env          # then edit .env
#   docker compose up -d
#
# First run will automatically obtain a Let's Encrypt certificate.
# Renewals happen automatically in the background.

services:
  # ── Hermes Agent ───────────────────────────────────────────────────
  hermes:
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    pull_policy: missing
    command: sleep infinity
    ports:
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    networks:
      - hermes-net

  # ── Nginx reverse proxy ────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env}
      - ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET:?Set ACCESS_KEY_SECRET in .env}
    volumes:
      - ./nginx/prod-bootstrap.conf.template:/etc/nginx/conf.d/bootstrap.conf.template:ro
      - ./nginx/prod.conf.template:/etc/nginx/conf.d/prod.conf.template:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "
      envsubst '\$\$DOMAIN \$\$ACCESS_KEY_SECRET' \
        < /etc/nginx/conf.d/bootstrap.conf.template \
        > /etc/nginx/conf.d/default.conf \
      && echo 'nginx bootstrap config rendered' \
      && exec nginx -g 'daemon off;'
      "
    depends_on:
      - hermes
    networks:
      - hermes-net

  # ── Certbot — initial cert + auto-renewal ──────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: hermes-certbot
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN:?Set DOMAIN in .env}
      - ACCESS_KEY_SECRET=${ACCESS_KEY_SECRET:?Set ACCESS_KEY_SECRET in .env}
      - EMAIL=${EMAIL:-}
    volumes:
      - ./scripts/certbot-entrypoint.sh:/entrypoint.sh:ro
      - ./nginx/prod.conf.template:/etc/nginx/conf.d/prod.conf.template:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    entrypoint: /bin/sh
    command: /entrypoint.sh
    depends_on:
      - nginx
    networks:
      - hermes-net

volumes:
  hermes_data:

networks:
  hermes-net:
    driver: bridge
