# Nginx config for local HTTPS with self-signed certificate.
# No Certbot, no access-key guard — suitable for local-only / LAN use.
# Browser will show a security warning. Click Advanced → Proceed.

server {
    listen 80;
    server_name hermes.local localhost 127.0.0.1;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hermes.local localhost 127.0.0.1;

    ssl_certificate     /etc/letsencrypt/live/hermes.local/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hermes.local/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Root: proxy to Hermes dashboard ──
    location / {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /;
    }

    # ── WebSocket / SSE endpoints ──
    location /api/ws {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /api/pty {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /api/events {
        proxy_pass http://hermes:9119;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }
}
