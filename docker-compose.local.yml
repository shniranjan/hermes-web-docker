# Local development stack — Hermes Agent only, no nginx, no SSL.
# Just `docker compose -f docker-compose.local.yml up -d`
# Dashboard at http://localhost:9119

services:
  hermes:
    image: ghcr.io/shniranjan/hermes-agent:latest
    container_name: hermes-local
    restart: unless-stopped
    pull_policy: missing
    command: sleep infinity
    ports:
      - "9119:9119"
    volumes:
      - hermes_data:/opt/data
    environment:
      - HERMES_UID=${HERMES_UID:-1000}
      - HERMES_GID=${HERMES_GID:-1000}
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      - HERMES_DASHBOARD_INSECURE=${HERMES_DASHBOARD_INSECURE:-1}
      - HERMES_GATEWAY_BOOTSTRAP_STATE=running
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}

volumes:
  hermes_data:
